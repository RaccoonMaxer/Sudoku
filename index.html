<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlimited Sudoku</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Unlimited Sudoku</h1>
        <p>Solve the board to instantly start a new puzzle.</p>
      </header>

      <section class="controls">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" aria-label="Difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="expert">Expert</option>
        </select>
        <button id="new-game" type="button">New Puzzle</button>
        <button id="hint" type="button">Get Hint</button>
        <button id="show-solution" type="button">Show Solution</button>
      </section>

      <p id="status" role="status" aria-live="polite"></p>

      <section id="board" class="board" aria-label="Sudoku board"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
